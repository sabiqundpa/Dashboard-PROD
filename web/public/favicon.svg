<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer segmented ring (mimics the arc-segments in the reference icon) -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="#111" stroke-width="3.5"
    stroke-dasharray="90 18 125 18 35 9" stroke-dashoffset="48" stroke-linecap="round"/>

  <!-- Black circle background -->
  <circle cx="50" cy="50" r="43" fill="#0d0d0d"/>

  <!-- Gray gear: center (38,48), 8 teeth, outer-r=16, inner-r=13, hub-r=6 -->
  <path fill="#A2A2A2" fill-rule="evenodd" d="
    M54,48 L50,53 L49.3,59.3 L43,60 L38,64
    L33,60 L26.7,59.3 L26,53 L22,48
    L26,43 L26.7,36.7 L33,36 L38,32
    L43,36 L49.3,36.7 L50,43 Z
    M44,48 A6,6 0 0,1 32,48 A6,6 0 0,1 44,48 Z"/>

  <!-- Orange gear: center (58,30), 6 teeth, outer-r=11, inner-r=8.5, hub-r=4 -->
  <path fill="#E88D0A" fill-rule="evenodd" d="
    M69,30 L65.4,34.3 L63.5,39.5 L58,38.5
    L52.5,39.5 L50.6,34.3 L47,30
    L50.6,25.7 L52.5,20.5 L58,21.5
    L63.5,20.5 L65.4,25.7 Z
    M62,30 A4,4 0 0,1 54,30 A4,4 0 0,1 62,30 Z"/>

  <!-- Teal gear: center (58,65), 6 teeth, outer-r=10, inner-r=8, hub-r=3.5 -->
  <path fill="#1499AA" fill-rule="evenodd" d="
    M68,65 L64.9,69 L63,73.7 L58,73
    L53,73.7 L51.1,69 L48,65
    L51.1,61 L53,56.3 L58,57
    L63,56.3 L64.9,61 Z
    M61.5,65 A3.5,3.5 0 0,1 54.5,65 A3.5,3.5 0 0,1 61.5,65 Z"/>
</svg>
