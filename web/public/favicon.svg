<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Light theme: black background (logo hitam) */
    .f-bg   { fill: #0d0d0d; }
    .f-ring { stroke: #111111; }
    .f-gray { fill: #A2A2A2; }
    .f-hub1 { fill: #0d0d0d; }
    /* Dark theme: white background (logo putih) */
    @media (prefers-color-scheme: dark) {
      .f-bg   { fill: #f0f0f0; }
      .f-ring { stroke: #c8c8c8; }
      .f-gray { fill: #9A9A9A; }
      .f-hub1 { fill: #f0f0f0; }
    }
  </style>

  <!-- Outer segmented decorative ring -->
  <circle cx="50" cy="50" r="47" fill="none" class="f-ring" stroke-width="3.5"
    stroke-dasharray="90 18 125 18 35 9" stroke-dashoffset="48" stroke-linecap="round"/>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="43" class="f-bg"/>

  <!-- ── Gray gear: center (38,48), 8 teeth, outer=16, inner=13 ── -->
  <path class="f-gray" d="
    M54,48 L50,53 L49.3,59.3 L43,60 L38,64
    L33,60 L26.7,59.3 L26,53 L22,48
    L26,43 L26.7,36.7 L33,36 L38,32
    L43,36 L49.3,36.7 L50,43 Z"/>
  <!-- Gray gear hub hole -->
  <circle cx="38" cy="48" r="6" class="f-hub1"/>

  <!-- ── Orange gear: center (58,30), 6 teeth, outer=11, inner=8.5 ── -->
  <path fill="#E88D0A" d="
    M69,30 L65.4,34.3 L63.5,39.5 L58,38.5
    L52.5,39.5 L50.6,34.3 L47,30
    L50.6,25.7 L52.5,20.5 L58,21.5
    L63.5,20.5 L65.4,25.7 Z"/>
  <!-- Orange gear hub hole -->
  <circle cx="58" cy="30" r="4" class="f-bg"/>

  <!-- ── Teal gear: center (58,65), 6 teeth, outer=10, inner=8 ── -->
  <path fill="#1499AA" d="
    M68,65 L64.9,69 L63,73.7 L58,73
    L53,73.7 L51.1,69 L48,65
    L51.1,61 L53,56.3 L58,57
    L63,56.3 L64.9,61 Z"/>
  <!-- Teal gear hub hole -->
  <circle cx="58" cy="65" r="3.5" class="f-bg"/>
</svg>
